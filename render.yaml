services:
  - type: web
    name: django-location-tracker
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn location_tracker.wsgi"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*" # You should restrict this to your actual domain later
      - key: DATABASE_URL
        fromDatabase:
          name: tracker-db
          property: connectionString
    disk:
      name: tracker-data
      mountPath: /data
      sizeGB: 1

databases:
  - name: tracker-db
    databaseName: tracker_db
    user: tracker_user
